version: '3.8'

services:
  agent-stack:
    image: node:20-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    command: ["sh", "-c", "npm install -g opencode-ai && opencode start"]
    ports:
      - "3000:3000"

  # Rust build environment for FORGE
  rust-builder:
    image: rust:1.80-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
    command: ["cargo", "check"]
    profiles:
      - build

volumes:
  cargo-cache:
